<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a9e6f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  <!-- Mosque Icon -->
  <g fill="white" transform="translate(256, 280)">
    <!-- Main dome -->
    <ellipse cx="0" cy="-80" rx="80" ry="60"/>
    <!-- Crescent on top -->
    <g transform="translate(0, -155)">
      <circle cx="0" cy="0" r="18"/>
      <circle cx="6" cy="0" r="14" fill="url(#grad)"/>
    </g>
    <!-- Building base -->
    <rect x="-100" y="-30" width="200" height="110" rx="5"/>
    <!-- Door -->
    <rect x="-25" y="20" width="50" height="60" rx="25" ry="25" fill="url(#grad)"/>
    <!-- Windows -->
    <ellipse cx="-60" cy="10" rx="18" ry="25" fill="url(#grad)"/>
    <ellipse cx="60" cy="10" rx="18" ry="25" fill="url(#grad)"/>
    <!-- Minarets -->
    <rect x="-130" y="-100" width="20" height="180" rx="3" />
    <rect x="110" y="-100" width="20" height="180" rx="3" />
    <!-- Minaret tops -->
    <polygon points="-120,-100 -130,-130 -110,-130" />
    <polygon points="120,-100 110,-130 130,-130" />
    <!-- Minaret crescents -->
    <circle cx="-120" cy="-138" r="8"/>
    <circle cx="-116" cy="-138" r="6" fill="url(#grad)"/>
    <circle cx="120" cy="-138" r="8"/>
    <circle cx="124" cy="-138" r="6" fill="url(#grad)"/>
  </g>
  <!-- App name initial -->
  <text x="256" y="450" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="rgba(255,255,255,0.3)" text-anchor="middle">FINETOUCH</text>
</svg>
