<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2e1f"/>
      <stop offset="50%" style="stop-color:#0d4a35"/>
      <stop offset="100%" style="stop-color:#0d6b4e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#d4b85a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Pattern -->
  <g opacity="0.05">
    <pattern id="p" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M30 0 L60 30 L30 60 L0 30Z" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#p)"/>
  </g>
  <!-- Icon -->
  <rect x="520" y="140" width="160" height="160" rx="40" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="2"/>
  <text x="600" y="245" text-anchor="middle" font-size="80" fill="white" font-family="sans-serif">&#9770;</text>
  <!-- Title -->
  <text x="600" y="370" text-anchor="middle" font-size="64" font-weight="bold" fill="white" font-family="Poppins, sans-serif">Maktab</text>
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-size="24" fill="white" fill-opacity="0.7" font-family="Poppins, sans-serif">Best Maktab Management Software</text>
  <!-- Tagline -->
  <text x="600" y="470" text-anchor="middle" font-size="18" fill="url(#gold)" font-family="Poppins, sans-serif">Students • Attendance • Fees • Staff • Parent Portal</text>
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="white" fill-opacity="0.05"/>
  <text x="600" y="612" text-anchor="middle" font-size="16" fill="white" fill-opacity="0.4" font-family="Poppins, sans-serif" letter-spacing="3">ISLAMIC EDUCATION, SIMPLIFIED</text>
</svg>
