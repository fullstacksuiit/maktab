<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Maktab{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0d6b4e 0%, #1a9e6f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float 15s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M40 0L80 40L40 80L0 40z'/%3E%3Ccircle cx='40' cy='40' r='8'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-20px, -20px) rotate(180deg); }
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 45px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 550px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .bismillah {
            font-size: 22px;
            color: #0d6b4e;
            margin-bottom: 15px;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        .auth-header .logo {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #0d6b4e 0%, #1a9e6f 100%);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(13, 107, 78, 0.4);
        }

        .auth-header .logo i { color: white; font-size: 40px; }

        .auth-header h2 {
            background: linear-gradient(135deg, #0d6b4e 0%, #c9a84c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 32px;
            margin-bottom: 8px;
        }

        .auth-header p { color: #666; font-size: 15px; font-weight: 400; }

        .form-label { font-weight: 500; color: #333; margin-bottom: 8px; font-size: 14px; }

        .form-control, textarea.form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-control:focus, textarea.form-control:focus {
            border-color: #0d6b4e;
            box-shadow: 0 0 0 0.25rem rgba(13, 107, 78, 0.15);
            background: white;
            outline: none;
        }

        .form-control::placeholder { color: #aaa; }

        .btn-primary {
            background: linear-gradient(135deg, #0d6b4e 0%, #1a9e6f 100%);
            border: none;
            padding: 14px;
            font-weight: 600;
            font-size: 16px;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(13, 107, 78, 0.4);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #1a9e6f 0%, #0d6b4e 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13, 107, 78, 0.5);
        }

        .btn-primary:active { transform: translateY(0); }

        .text-danger { font-size: 13px; margin-top: 5px; }

        .alert {
            border-radius: 12px; border: none;
            padding: 15px 20px; font-size: 14px; font-weight: 500;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .alert-success {
            background: linear-gradient(135deg, #0d6b4e 0%, #1a9e6f 100%);
            color: white;
        }

        .alert-danger, .alert-error {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .auth-footer {
            text-align: center; margin-top: 25px;
            padding-top: 20px; border-top: 1px solid #e0e0e0;
        }

        .auth-footer a {
            color: #0d6b4e; text-decoration: none; font-weight: 600;
            transition: all 0.3s ease;
        }

        .auth-footer a:hover { color: #c9a84c; text-decoration: underline; }

        .mb-3 { margin-bottom: 20px !important; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        {% if messages %}
            <div class="position-fixed top-0 end-0 p-3" style="z-index: 11">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
