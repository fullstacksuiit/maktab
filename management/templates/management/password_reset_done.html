{% extends 'management/base_tailwind.html' %}

{% block title %}Email Sent - Maktab{% endblock %}

{% block content %}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-white overflow-auto">
    <div class="w-full max-w-sm p-6 sm:p-8 text-center">

        <div class="fade-in" style="animation-delay: 0.1s">
            <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-envelope-open-text text-2xl text-emerald-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Check your email</h2>
            <p class="text-gray-400 mb-8">If an account exists with that email address, we've sent a password reset link. Please check your inbox and spam folder.</p>
        </div>

        <div class="fade-in" style="animation-delay: 0.2s">
            <a href="{% url 'login' %}" class="inline-flex items-center justify-center gap-2.5 w-full py-3.5 bg-gray-900 hover:bg-gray-800 text-white font-semibold rounded-xl shadow-lg shadow-gray-900/20 hover:shadow-gray-900/30 active:scale-[0.98] transition-all duration-200 text-sm">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Sign In</span>
            </a>
        </div>
    </div>
</div>

<style>
    #sidebar, header, #mobile-header, #sidebar-overlay { display: none !important; }
    main { margin-left: 0 !important; padding-top: 0 !important; }
    .fade-in {
        opacity: 0;
        animation: fadeIn 0.5s ease forwards;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
